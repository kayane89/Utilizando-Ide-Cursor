<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada Inteligente - IDE Cursor</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <h1>Aprendendo a utilizar a IDE Cursor</h1>
        <p>
            A IDE Cursor é uma ferramenta de desenvolvimento de software que permite aos desenvolvedores criar e editar código de forma eficiente.
        </p>

        <section class="tabuada-section">
            <h2>Gerador de Tabuada</h2>
            <div class="input-group">
                <input type="number" id="numInput" placeholder="Digite um número inteiro..." min="0">
                <button id="btnGerar">Gerar Tabuada</button>
            </div>
            <div id="resultado" class="resultado-container">
                <!-- A tabuada aparecerá aqui -->
            </div>
        </section>
    </div>

</body>
</html>
